<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Delete Account - NayeJaisa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #F4F7F1;
      padding: 30px;
      color: #1A3125;
    }
    h1 {
      color: #E5603B;
    }
    .container {
      max-width: 400px;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #E5EEE2;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #E5603B;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .note {
      font-size: 13px;
      color: #466454;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>NayeJaisa - Delete Account Request</h1>

  <div class="container">
    <form action="mailto:support@nayejaisa.com" method="post" enctype="text/plain">
      
      <label>Full Name</label>
      <input type="text" name="Full Name" required />

      <label>Registered Mobile Number</label>
      <input type="tel" name="Mobile Number" required />

      <label>Reason (Optional)</label>
      <textarea name="Reason" rows="3"></textarea>

      <button type="submit">Submit Delete Request</button>
    </form>

    <p class="note">
      After verification, your account and all associated data will be permanently deleted within 7 working days.
    </p>
  </div>

</body>
</html>
