<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Delete Account - NayeJaisa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #F4F7F1;
      color: #1A3125;
      text-align: center;
    }

    h1 {
      color: #E5603B;
    }

    .box {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #E5EEE2;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .btn {
      display: block;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      color: #ffffff;
      cursor: pointer;
    }

    .email { background-color: #0D7A4F; }
    .whatsapp { background-color: #25D366; }
  </style>
</head>
<body>

  <h1>Delete Your NayeJaisa Account</h1>

  <div class="box">
    <p>Please enter your details to request account deletion.</p>

    <input type="text" id="name" placeholder="Enter Your Name" required />
    <input type="tel" id="mobile" placeholder="Enter Registered Mobile Number" required />

    <a id="emailBtn" class="btn email">Delete via Email</a>
    <a id="waBtn" class="btn whatsapp">Delete via WhatsApp</a>

    <p style="margin-top:20px;font-size:12px;">
      Your account will be permanently deleted within 7 working days after verification.
    </p>
  </div>

<script>
function getDetails() {
  var name = document.getElementById("name").value.trim();
  var mobile = document.getElementById("mobile").value.trim();

  if (!name || !mobile) {
    alert("Please enter both name and mobile number.");
    return null;
  }

  return { name, mobile };
}

document.getElementById("emailBtn").onclick = function () {
  var details = getDetails();
  if (!details) return;

  var subject = "Delete My NayeJaisa Account";
  var body = "Hello NayeJaisa Team,%0A%0A"
           + "I want to delete my account.%0A%0A"
           + "Name: " + details.name + "%0A"
           + "Registered Mobile: " + details.mobile + "%0A%0A"
           + "Thank you.";

  window.location.href =
    "mailto:nayejaisaapp@gmail.com?subject=" + subject + "&body=" + body;
};

document.getElementById("waBtn").onclick = function () {
  var details = getDetails();
  if (!details) return;

  var message = "Hello NayeJaisa Team, I want to delete my account. "
              + "Name: " + details.name + ", "
              + "Registered Mobile: " + details.mobile;

  window.location.href =
    "https://wa.me/918817332335?text=" + encodeURIComponent(message);
};
</script>

</body>
</html>
